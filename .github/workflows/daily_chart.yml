name: Daily Stock Charts

on:
  workflow_dispatch:

jobs:
  run-chart-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Packages
        run: pip install -r requirements.txt

      - name: Run Script
        run: python chart_bot.py
